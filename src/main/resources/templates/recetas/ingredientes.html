<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Ingredientes de Receta | Sistema')}"></head>

<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mt-4 mb-4">
                    <div class="welcome-section">
                        <h1 class="welcome-title">
                            <i class="bi bi-list-check me-2"></i>
                            Ingredientes de la Receta
                        </h1>
                        <p class="welcome-subtitle" th:text="${receta.nombre}">
                            Café Latte
                        </p>
                    </div>
                    <div>
                        <a th:href="@{/recetas/editar/{id}(id=${receta.id})}" class="btn btn-primary me-2">
                            <i class="bi bi-pencil me-2"></i>
                            Editar receta
                        </a>
                        <a th:href="@{/recetas/ver/{id}(id=${receta.id})}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>
                            Volver a receta
                        </a>
                    </div>
                </div>

                <!-- Tabla de ingredientes -->
                <div class="card">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-semibold">
                            <i class="bi bi-basket me-2"></i>
                            Lista de Ingredientes
                        </h5>
                        <span class="badge bg-primary" th:text="${totalItems} + ' ingredientes'">5 ingredientes</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-4">INGREDIENTE</th>
                                        <th>CANTIDAD</th>
                                        <th>UNIDAD</th>
                                        <th>COSTO UNITARIO</th>
                                        <th>COSTO TOTAL</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="detalle : ${ingredientes}">
                                        <td class="ps-4 fw-semibold" th:text="${detalle.ingrediente.nombre}">Harina</td>
                                        <td th:text="${detalle.cantidadIngrediente}">500</td>
                                        <td th:text="${detalle.ingrediente.unidadMedida}">g</td>
                                        <td>
                                            <span th:if="${detalle.ingrediente.precioCompra}">
                                                $ <span th:text="${detalle.ingrediente.precioCompra}">0.05</span> /
                                                <span th:text="${detalle.ingrediente.unidadMedida}">g</span>
                                            </span>
                                            <span th:unless="${detalle.ingrediente.precioCompra}"
                                                class="text-secondary">-</span>
                                        </td>
                                        <td>
                                            <span th:if="${detalle.ingrediente.precioCompra}">
                                                $ <span
                                                    th:text="${detalle.ingrediente.precioCompra * detalle.cantidadIngrediente}">25.00</span>
                                            </span>
                                            <span th:unless="${detalle.ingrediente.precioCompra}"
                                                class="text-secondary">-</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${ingredientes.empty}">
                                        <td colspan="5" class="text-center py-5 text-secondary">
                                            <i class="bi bi-inbox display-4 d-block mb-3"></i>
                                            Esta receta no tiene ingredientes
                                        </td>
                                    </tr>
                                </tbody>
                                <tfoot th:unless="${ingredientes.empty}" class="table-light">
                                    <tr>
                                        <td colspan="4" class="text-end fw-semibold ps-4">TOTAL COSTO BRUTO:</td>
                                        <td class="fw-bold text-primary">$ <span
                                                th:text="${receta.precioBruto}">27.50</span></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Paginación -->
                <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
                    <div class="text-secondary small">
                        Mostrando página <span th:text="${currentPage + 1}"></span> de <span
                            th:text="${totalPages}"></span>
                    </div>
                    <nav aria-label="Paginación">
                        <ul class="pagination mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/recetas/{id}/ingredientes(id=${receta.id}, page=${currentPage - 1})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{/recetas/{id}/ingredientes(id=${receta.id}, page=${i})}"
                                    th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/recetas/{id}/ingredientes(id=${receta.id}, page=${currentPage + 1})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>

                <!-- FOOTER -->
                <div th:replace="~{fragments/footer :: footer}"></div>

            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
