<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head}"></head>

<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <!-- Header con título -->
                <div class="welcome-section mt-4 mb-4">
                    <h1 class="welcome-title">
                        <i class="bi bi-journal-bookmark-fill me-2" th:if="${receta.id == null}"></i>
                        <i class="bi bi-pencil-square me-2" th:if="${receta.id != null}"></i>
                        <span th:text="${receta.id == null} ? 'Nueva Receta' : 'Editar Receta'"></span>
                    </h1>
                    <p class="welcome-subtitle"
                        th:text="${receta.id == null} ? 'Crea una nueva receta' : 'Modifica los datos de la receta'">
                        Crea una nueva receta
                    </p>
                </div>

                <!-- Formulario -->
                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/recetas/guardar}" method="post" class="needs-validation" novalidate>

                            <input type="hidden" name="id" th:value="${receta.id}">
                            <input type="hidden" name="totalIngredientes" id="totalIngredientes"
                                th:value="${receta.listaIngredientes != null ? receta.listaIngredientes.size() : 0}">

                            <!-- Datos básicos -->
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label text-uppercase small fw-bold">
                                        <i class="bi bi-tag me-1"></i>
                                        NOMBRE DE LA RECETA
                                    </label>
                                    <input type="text" class="form-control" name="nombre" th:value="${receta.nombre}"
                                        required placeholder="Ej: Receta Café Latte">
                                    <div class="invalid-feedback">
                                        El nombre es obligatorio
                                    </div>
                                </div>

                                <div class="col-12 mb-4">
                                    <label class="form-label text-uppercase small fw-bold">
                                        <i class="bi bi-card-text me-1"></i>
                                        DESCRIPCIÓN
                                    </label>
                                    <textarea class="form-control" name="descripcion" rows="2"
                                        placeholder="Descripción de la receta..."
                                        th:text="${receta.descripcion}"></textarea>
                                </div>
                            </div>

                            <!-- Sección de ingredientes -->
                            <hr class="my-4">

                            <!-- Ingredient Section Header -->
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-semibold mb-0">
                                    <i class="bi bi-list-check me-2"></i>
                                    Ingredientes de la receta
                                </h5>
                                <button type="button" class="btn btn-sm btn-outline-primary" id="btnAgregarIngrediente">
                                    <i class="bi bi-plus-circle me-1"></i>
                                    Agregar ingrediente
                                </button>
                            </div>

                            <!-- Ingredients Table -->
                            <div class="table-responsive mb-3">
                                <table class="table table-bordered table-hover align-middle" id="tablaIngredientes">
                                    <thead class="table-light">
                                        <tr>
                                            <th>INGREDIENTE</th>
                                            <th style="width: 200px">CANTIDAD</th>
                                            <th style="width: 100px">ACCIÓN</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tbodyIngredientes">
                                        <!-- Dynamic Ingredient Rows -->
                                        <tr th:each="detalle, iter : ${receta.listaIngredientes}">
                                            <td>
                                                <select class="form-select form-select-sm"
                                                    th:name="'ingredientesIds[' + ${iter.index} + ']'" required>
                                                    <option value="">Seleccionar</option>
                                                    <option th:each="ing : ${ingredientes}" th:value="${ing.id}"
                                                        th:text="${ing.nombre}"
                                                        th:selected="${detalle.ingrediente != null and detalle.ingrediente.id == ing.id}">
                                                    </option>
                                                </select>
                                            </td>
                                            <td>
                                                <input type="number" step="0.001" class="form-control form-control-sm"
                                                    th:name="'cantidades[' + ${iter.index} + ']'"
                                                    th:value="${detalle.cantidadIngrediente}" placeholder="0.000"
                                                    required>
                                            </td>
                                            <td class="text-center">
                                                <button type="button" class="btn btn-sm btn-outline-danger"
                                                    onclick="eliminarFila(this)">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </td>
                                        </tr>

                                        <!-- Empty State Message (when no ingredients) -->
                                        <tr th:if="${#lists.isEmpty(receta.listaIngredientes)}" id="filaVacia">
                                            <td colspan="3" class="text-center py-4 text-muted">
                                                <i class="bi bi-database fs-4 d-block mb-2"></i>
                                                <span>No hay ingredientes agregados</span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Hidden Template for New Rows -->
                            <template id="templateFila">
                                <tr>
                                    <td>
                                        <select class="form-select form-select-sm" name="temp_ingrediente" required>
                                            <option value="">Seleccionar</option>
                                            <option th:each="ing : ${ingredientes}" th:value="${ing.id}"
                                                th:text="${ing.nombre}">
                                            </option>
                                        </select>
                                    </td>
                                    <td>
                                        <input type="number" step="0.001" class="form-control form-control-sm"
                                            name="temp_cantidad" placeholder="0.000" required>
                                    </td>
                                    <td class="text-center">
                                        <button type="button" class="btn btn-sm btn-outline-danger"
                                            onclick="eliminarFila(this)">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </template>

                            <!-- Acciones -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary px-5">
                                    <i class="bi bi-check-circle me-2"></i>
                                    Guardar Receta
                                </button>
                                <a th:href="@{/recetas}" class="btn btn-outline-secondary px-5">
                                    <i class="bi bi-x-circle me-2"></i>
                                    Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- FOOTER -->
                <div th:replace="~{fragments/footer :: footer}"></div>

            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script th:inline="javascript">
        // Bootstrap validation
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()

        // Manejo dinámico de ingredientes
        /*<![CDATA[*/
        let contador = /*[[${receta.listaIngredientes != null ? receta.listaIngredientes.size() : 0}]]*/ 0;
        /*]]>*/

        document.getElementById('btnAgregarIngrediente').addEventListener('click', function () {
            const tbody = document.getElementById('tbodyIngredientes');

            // Eliminar mensaje de fila vacía si existe
            const filaVacia = document.getElementById('filaVacia');
            if (filaVacia) {
                filaVacia.remove();
            }

            // Crear nueva fila
            const template = document.getElementById('templateFila');
            const newRow = template.content.cloneNode(true);

            // Actualizar nombres de los campos con el índice actual
            newRow.querySelector('select[name="temp_ingrediente"]').name = 'ingredientesIds';
            newRow.querySelector('input[name="temp_cantidad"]').name = 'cantidades';
            tbody.appendChild(newRow);
            contador++;

            // Actualizar campo oculto
            document.getElementById('totalIngredientes').value = contador;
        });

        function eliminarFila(btn) {
            const row = btn.closest('tr');
            row.remove();

            // Si no quedan filas, mostrar mensaje vacío
            const tbody = document.getElementById('tbodyIngredientes');
            if (tbody.children.length === 0) {
                const filaVacia = document.createElement('tr');
                filaVacia.id = 'filaVacia';
                filaVacia.innerHTML = '<td colspan="3" class="text-center py-4 text-muted">' +
                    '<i class="bi bi-database fs-4 d-block mb-2"></i>' +
                    '<span>No hay ingredientes agregados</span>' +
                    '</td>';
                tbody.appendChild(filaVacia);
            }
        }

        // Antes de enviar el formulario, verificar que hay ingredientes
        document.querySelector('form').addEventListener('submit', function (e) {
            const tbody = document.getElementById('tbodyIngredientes');
            const filas = tbody.querySelectorAll('tr:not([id="filaVacia"])');

            if (filas.length === 0) {
                e.preventDefault();
                alert('Debe agregar al menos un ingrediente a la receta');
                return false;
            }
            // VALIDAR DUPLICADOS
            // ✅ VALIDAR DUPLICADOS (JS)
            if (!validarDuplicados()) {
                e.preventDefault();
                return false;
            }

            // Verificar que todas las filas tengan seleccionado un ingrediente y cantidad válida
            for (let fila of filas) {
                const select = fila.querySelector('select');
                const input = fila.querySelector('input[type="number"]');

                if (!select.value || select.value === '') {
                    e.preventDefault();
                    alert('Debe seleccionar un ingrediente para todas las filas');
                    return false;
                }

                if (!input.value || parseFloat(input.value) <= 0) {
                    e.preventDefault();
                    alert('Debe ingresar una cantidad válida mayor a 0 para todos los ingredientes');
                    return false;
                }
            }
        });
        function validarDuplicados() {
            const selects = document.querySelectorAll('#tablaIngredientes select');
            const valores = [];

            for (let select of selects) {
                const val = select.value;

                // Ignorar vacíos
                if (!val) continue;

                if (valores.includes(val)) {
                    alert("No puedes repetir ingredientes");
                    return false;
                }

                valores.push(val);
            }

            return true;
        }
    </script>
</body>

</html>
