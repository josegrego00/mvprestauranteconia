<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">

            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <div class="welcome-section mt-4 mb-4">
                    <h1 class="welcome-title">
                        <i class="bi bi-file-earmark-bar-graph me-2"></i>
                        Reporte de Inventario
                    </h1>
                    <p class="welcome-subtitle">
                        Seguimiento del inventario por período
                    </p>
                </div>

                <!-- Filtros -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <form th:action="@{/inventario/reporte}" method="get" class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label text-uppercase small fw-bold">DESDE</label>
                                <input type="date" class="form-control" name="fechaDesde" th:value="${fechaDesde}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-uppercase small fw-bold">HASTA</label>
                                <input type="date" class="form-control" name="fechaHasta" th:value="${fechaHasta}">
                            </div>
                            <div class="col-md-4 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-search me-2"></i>Buscar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Tabla -->
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-table text-primary me-2"></i>
                            Resultados
                        </h5>
                        <small class="text-muted" th:text="${reporte.size()} + ' registros por página'"></small>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="px-3">Fecha</th>
                                        <th>Nombre</th>
                                        <th class="text-center">Tipo</th>
                                        <th class="text-center">Und.</th>
                                        <th class="text-center bg-success bg-opacity-10">Inv. Inicial</th>
                                        <th class="text-center bg-warning bg-opacity-10">Consumo</th>
                                        <th class="text-center bg-primary bg-opacity-10">Inv. Final</th>
                                        <th class="text-center">Diferencia</th>
                                        <th class="text-end px-3">Diferencia $</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${reporte}">
                                        <td class="px-3" th:text="${#temporals.format(item.fecha, 'dd/MM/yyyy')}">01/01/2024</td>
                                        <td>
                                            <span class="fw-medium" th:text="${item.nombre}">Nombre</span>
                                        </td>
                                        <td class="text-center">
                                            <span th:if="${item.tipo == 'INGREDIENTE'}" class="badge bg-info">Ing.</span>
                                            <span th:if="${item.tipo == 'PRODUCTO'}" class="badge bg-warning text-dark">Prod.</span>
                                        </td>
                                        <td class="text-center" th:text="${item.unidadMedida}">UND</td>
                                        <td class="text-center bg-success bg-opacity-10 fw-bold" 
                                            th:text="${#numbers.formatDecimal(item.inventarioInicial, 1, 'COMMA', 2, 'POINT')}">0</td>
                                        <td class="text-center bg-warning bg-opacity-10" 
                                            th:text="${#numbers.formatDecimal(item.consumo, 1, 'COMMA', 2, 'POINT')}">0</td>
                                        <td class="text-center bg-primary bg-opacity-10 fw-bold" 
                                            th:text="${#numbers.formatDecimal(item.inventarioFinal, 1, 'COMMA', 2, 'POINT')}">0</td>
                                        <td class="text-center">
                                            <span th:if="${item.diferencia > 0}" class="text-success fw-bold" th:text="'+' + ${#numbers.formatDecimal(item.diferencia, 1, 'COMMA', 2, 'POINT')}">+0</span>
                                            <span th:if="${item.diferencia < 0}" class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.diferencia, 1, 'COMMA', 2, 'POINT')}">-0</span>
                                            <span th:if="${item.diferencia == 0}" class="text-muted" th:text="0">0</span>
                                        </td>
                                        <td class="text-end px-3">
                                            <span th:if="${item.diferenciaDinero > 0}" class="text-success fw-bold" th:text="'+$' + ${#numbers.formatDecimal(item.diferenciaDinero, 1, 'COMMA', 2, 'POINT')}">+$0</span>
                                            <span th:if="${item.diferenciaDinero < 0}" class="text-danger fw-bold" th:text="'$' + ${#numbers.formatDecimal(item.diferenciaDinero, 1, 'COMMA', 2, 'POINT')}">-$0</span>
                                            <span th:if="${item.diferenciaDinero == 0}" class="text-muted">$0</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(reporte)}">
                                        <td colspan="9" class="text-center text-muted py-4">
                                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                            No hay datos para el período seleccionado
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Paginación -->
                <div class="mt-4" th:if="${totalPages > 1}">
                    <nav>
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/inventario/reporte(fechaDesde=${fechaDesde}, fechaHasta=${fechaHasta}, page=${currentPage - 1})}">Anterior</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{/inventario/reporte(fechaDesde=${fechaDesde}, fechaHasta=${fechaHasta}, page=${i})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                <a class="page-link" th:href="@{/inventario/reporte(fechaDesde=${fechaDesde}, fechaHasta=${fechaHasta}, page=${currentPage + 1})}">Siguiente</a>
                            </li>
                        </ul>
                    </nav>
                </div>

            </main>
        </div>
    </div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
