<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">

            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <div class="welcome-section mt-4 mb-4">
                    <h1 class="welcome-title">
                        <i class="bi bi-clipboard-data me-2"></i>
                        Inventario Físico
                    </h1>
                    <p class="welcome-subtitle">
                        Conta el stock real al final del día
                    </p>
                </div>

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/inventario/guardar}" method="post" id="inventarioForm">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 py-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-0 fw-bold">
                                        <i class="bi bi-list-check text-primary me-2"></i>
                                        Inventario
                                    </h5>
                                    <small class="text-muted">Ingresa el stock físico de cada item</small>
                                </div>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/inventario/descargar-plantilla}" class="btn btn-outline-secondary">
                                        <i class="bi bi-file-earmark-excel me-2"></i>Descargar Plantilla
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-save me-2"></i>Guardar Inventario
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="px-3">Tipo</th>
                                            <th>Nombre</th>
                                            <th class="text-center">Unidad</th>
                                            <th class="text-center bg-success bg-opacity-10">Stock Sistema</th>
                                            <th class="text-center bg-primary bg-opacity-10">Stock Físico</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${items}">
                                            <td class="px-3">
                                                <span th:if="${item.tipo == 'INGREDIENTE'}" class="badge bg-info">Ing.</span>
                                                <span th:if="${item.tipo == 'PRODUCTO'}" class="badge bg-warning text-dark">Prod.</span>
                                            </td>
                                            <td>
                                                <span class="fw-medium" th:text="${item.nombre}">Nombre</span>
                                            </td>
                                            <td class="text-center" th:text="${item.unidadMedida}">UND</td>
                                            <td class="text-center bg-success bg-opacity-10 fw-bold" 
                                                th:text="${#numbers.formatDecimal(item.stockSistema, 1, 'COMMA', 2, 'POINT')}">0</td>
                                            <td class="text-center bg-primary bg-opacity-10">
                                                <input type="number" 
                                                       class="form-control text-center" 
                                                       style="width: 100px; display: inline-block;"
                                                       th:name="${'stock_' + item.tipo + '_' + item.itemId}"
                                                       th:id="${'stock_' + item.tipo + '_' + item.itemId}"
                                                       value="0"
                                                       step="0.01"
                                                       min="0">
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(items)}">
                                            <td colspan="5" class="text-center text-muted py-4">
                                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                                No hay ingredientes ni productos para inventariar
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </form>

                <div th:replace="~{fragments/footer :: footer}"></div>

            </main>
        </div>
    </div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
