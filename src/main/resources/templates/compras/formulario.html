<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">

            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <div class="welcome-section mt-4 mb-4">
                    <h1 class="welcome-title">
                        <i class="bi bi-cart-plus me-2"></i>
                        Nueva Compra
                    </h1>
                    <p class="welcome-subtitle">
                        Registra una nueva compra de insumos
                    </p>
                </div>

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/compras/guardar}" th:object="${compra}" method="post" class="needs-validation" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="card mb-4">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0"><i class="bi bi-info-circle me-2"></i>Datos de la Compra</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-3">
                                    <label class="form-label text-uppercase small fw-bold">NÚMERO DE FACTURA</label>
                                    <input type="text" class="form-control" name="numeroCompra" placeholder="FAC-001" required>
                                    <small class="text-secondary">Ingrese el número de factura del proveedor</small>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-uppercase small fw-bold">PROVEEDOR</label>
                                    <input type="text" class="form-control" name="proveedor" placeholder="Nombre del proveedor">
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label text-uppercase small fw-bold">OBSERVACIONES</label>
                                    <input type="text" class="form-control" name="observaciones" placeholder="Notas adicionales...">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Items de la Compra</h5>
                            <i class="bi bi-plus-circle me-1"></i> Agregar Item
                            </button>
                            <button type="button" class="btn btn-light btn-sm" onclick="agregarItem()">
                        </div>
                        <div class="card-body">
                            <table class="table table-bordered" id="tablaItems">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 35%;">Tipo / Item</th>
                                        <th style="width: 20%;">Cantidad</th>
                                        <th style="width: 25%;">Precio Unitario</th>
                                        <th style="width: 15%;">Subtotal</th>
                                        <th style="width: 5%;"></th>
                                    </tr>
                                </thead>
                                <tbody id="itemsBody">
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold">TOTAL:</td>
                                        <td class="fw-bold fs-5">$<span id="totalGeneral">0.00</span></td>
                                        <td></td>
                                    </tr>
                                </tfoot>
                            </table>
                            <div class="text-center py-3" id="sinItems">
                                <p class="text-secondary mb-2">No hay items agregados</p>
                                <button type="button" class="btn btn-outline-primary" onclick="agregarItem()">
                                    <i class="bi bi-plus-circle me-2"></i>Agregar primer item
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4 mb-4">
                        <button type="submit" class="btn btn-primary px-5">
                            <i class="bi bi-check-circle me-2"></i>
                            Registrar Compra
                        </button>
                        <a th:href="@{/compras}" class="btn btn-outline-secondary px-5">
                            <i class="bi bi-x-circle me-2"></i>
                            Cancelar
                        </a>
                    </div>
                </form>

                <div th:replace="~{fragments/footer :: footer}"></div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script th:inline="javascript">
        const ingredientes = /*[[${ingredientes}]]*/ [];
        const productos = /*[[${productos}]]*/ [];
        
        let itemCount = 0;

        function agregarItem() {
            document.getElementById('sinItems').style.display = 'none';
            
            const tbody = document.getElementById('itemsBody');
            const tr = document.createElement('tr');
            tr.id = 'item-' + itemCount;
            
            let options = '<option value="">Seleccionar item...</option>';
            ingredientes.forEach(function(ing) {
                options += '<option value="' + ing.id + '|INGREDIENTE">' + ing.nombre + ' (Ing - ' + ing.unidadMedida + ')</option>';
            });
            productos.forEach(function(prod) {
                options += '<option value="' + prod.id + '|PRODUCTO">' + prod.nombre + ' (Prod)</option>';
            });

            tr.innerHTML = `
                <td>
                    <select class="form-select" name="itemId[${itemCount}]" onchange="actualizarSubtotal(${itemCount})">
                        ${options}
                    </select>
                </td>
                <td>
                    <input type="number" class="form-control cantidad" name="cantidad[${itemCount}]" min="1" value="1" onchange="actualizarSubtotal(${itemCount})">
                </td>
                <td>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control precio" name="precio[${itemCount}]" step="0.01" min="0" value="0" onchange="actualizarSubtotal(${itemCount})">
                    </div>
                </td>
                <td>
                    <span class="fw-bold">$</span>
                    <span class="subtotal-display">0.00</span>
                </td>
                <td>
                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="eliminarItem(${itemCount})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            `;
            
            tbody.appendChild(tr);
            itemCount++;
        }

        function actualizarSubtotal(id) {
            const row = document.getElementById('item-' + id);
            const cantidad = parseFloat(row.querySelector('.cantidad').value) || 0;
            const precio = parseFloat(row.querySelector('.precio').value) || 0;
            const subtotal = cantidad * precio;
            
            row.querySelector('.subtotal-display').textContent = subtotal.toFixed(2);
            calcularTotal();
        }

        function calcularTotal() {
            const rows = document.querySelectorAll('#itemsBody tr');
            let total = 0;
            rows.forEach(function(row) {
                const cantidad = parseFloat(row.querySelector('.cantidad').value) || 0;
                const precio = parseFloat(row.querySelector('.precio').value) || 0;
                total += cantidad * precio;
            });
            document.getElementById('totalGeneral').textContent = total.toFixed(2);
        }

        function eliminarItem(id) {
            const row = document.getElementById('item-' + id);
            row.remove();
            calcularTotal();
            
            const tbody = document.getElementById('itemsBody');
            if (tbody.children.length === 0) {
                document.getElementById('sinItems').style.display = 'block';
            }
        }

        (function() {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function(form) {
                form.addEventListener('submit', function(event) {
                    const rows = document.querySelectorAll('#itemsBody tr');
                    if (rows.length === 0) {
                        event.preventDefault()
                        event.stopPropagation()
                        alert('Debe agregar al menos un item a la compra')
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>

</body>

</html>
