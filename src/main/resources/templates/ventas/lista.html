<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">

            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <div class="welcome-section mt-4 mb-4">
                    <h1 class="welcome-title">
                        <i class="bi bi-cash-register me-2"></i>
                        Ventas
                    </h1>
                    <p class="welcome-subtitle">
                        Gestión de ventas y reportes
                    </p>
                </div>

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-funnel me-2"></i>Filtros</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/ventas}" method="get" class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label text-uppercase small fw-bold">BUSCAR</label>
                                <input type="text" class="form-control" name="search" th:value="${search}" placeholder="Número de venta...">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label text-uppercase small fw-bold">FECHA DESDE</label>
                                <input type="date" class="form-control" name="fechaInicio" th:value="${fechaInicio}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label text-uppercase small fw-bold">FECHA HASTA</label>
                                <input type="date" class="form-control" name="fechaFin" th:value="${fechaFin}">
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <div class="d-flex gap-2 w-100">
                                    <button type="submit" class="btn btn-primary flex-grow-1">
                                        <i class="bi bi-search me-1"></i> Buscar
                                    </button>
                                    <a th:href="@{/ventas}" class="btn btn-outline-secondary">
                                        <i class="bi bi-arrow-counterclockwise"></i>
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card bg-success text-white">
                            <div class="card-body">
                                <h6 class="card-title text-uppercase small"><i class="bi bi-arrow-down-circle me-2"></i>Total Ventas</h6>
                                <h3 class="mb-0">$<span th:text="${#numbers.formatDecimal(totalVentas, 1, 'COMMA', 2, 'POINT')}">0.00</span></h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-danger text-white">
                            <div class="card-body">
                                <h6 class="card-title text-uppercase small"><i class="bi bi-arrow-up-circle me-2"></i>Total Compras</h6>
                                <h3 class="mb-0">$0.00</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-primary text-white">
                            <div class="card-body">
                                <h6 class="card-title text-uppercase small"><i class="bi bi-graph-up me-2"></i>Balance</h6>
                                <h3 class="mb-0">$<span th:text="${#numbers.formatDecimal(totalVentas, 1, 'COMMA', 2, 'POINT')}">0.00</span></h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Listado de Ventas</h5>
                    <a th:href="@{/ventas/nueva}" class="btn btn-success">
                        <i class="bi bi-plus-circle me-2"></i>Nueva Venta
                    </a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>#</th>
                                        <th>Fecha</th>
                                        <th>Número</th>
                                        <th>Cliente</th>
                                        <th>Método Pago</th>
                                        <th>Total</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="venta, iter : ${ventas}">
                                        <td th:text="${iter.count + (currentPage * pageSize)}"></td>
                                        <td th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td th:text="${venta.numeroVenta}"></td>
                                        <td th:text="${venta.cliente?.nombre}"></td>
                                        <td th:text="${venta.metodoPago}"></td>
                                        <td class="fw-bold">$<span th:text="${#numbers.formatDecimal(venta.total, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
                                        <td>
                                            <span th:if="${venta.estado == 'COMPLETADA'}" class="badge bg-success">COMPLETADA</span>
                                            <span th:if="${venta.estado == 'ANULADA'}" class="badge bg-danger">ANULADA</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/ventas/ver/{id}(id=${venta.id})}" class="btn btn-sm btn-outline-primary">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                            <form th:if="${venta.estado == 'COMPLETADA'}" th:action="@{/ventas/anular/{id}(id=${venta.id})}" method="post" style="display:inline;">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Está seguro de anular esta venta?')">
                                                    <i class="bi bi-x-circle"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(ventas)}">
                                        <td colspan="8" class="text-center py-4 text-secondary">
                                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                            No hay ventas registradas
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <nav th:if="${totalPages > 1}" class="mt-3">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/ventas(page=0, size=${pageSize}, search=${search}, fechaInicio=${fechaInicio}, fechaFin=${fechaFin})}">Primera</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/ventas(page=${currentPage - 1}, size=${pageSize}, search=${search}, fechaInicio=${fechaInicio}, fechaFin=${fechaFin})}">Anterior</a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/ventas(page=${i}, size=${pageSize}, search=${search}, fechaInicio=${fechaInicio}, fechaFin=${fechaFin})}" th:text="${i + 1}"></a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link" th:href="@{/ventas(page=${currentPage + 1}, size=${pageSize}, search=${search}, fechaInicio=${fechaInicio}, fechaFin=${fechaFin})}">Siguiente</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link" th:href="@{/ventas(page=${totalPages - 1}, size=${pageSize}, search=${search}, fechaInicio=${fechaInicio}, fechaFin=${fechaFin})}">Última</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>

                <div th:replace="~{fragments/footer :: footer}"></div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
