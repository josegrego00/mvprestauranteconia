<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Ingredientes | Sistema')}"></head>

<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR IZQUIERDO -->
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <!-- Header con título y botón nuevo -->
                <div class="d-flex justify-content-between align-items-center mt-4 mb-4">
                    <div class="welcome-section">
                        <h1 class="welcome-title">
                            <i class="bi bi-basket me-2"></i>
                            Gestión de Ingredientes
                        </h1>
                        <p class="welcome-subtitle">
                            Administra los insumos de tu negocio
                        </p>
                    </div>
                    <a th:href="@{/ingredientes/nuevo}" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>
                        Nuevo Ingrediente
                    </a>
                </div>

                <!-- Alertas -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}">Operación exitosa</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}">Error en la operación</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Barra de búsqueda -->
                <div class="card mb-4">
                    <div class="card-body">
                        <form method="get" th:action="@{/ingredientes}" class="row g-3">
                            <div class="col-md-10">
                                <label class="form-label text-uppercase small fw-bold">BUSCAR INGREDIENTE</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0">
                                        <i class="bi bi-search"></i>
                                    </span>
                                    <input type="text" class="form-control border-start-0" name="search"
                                        th:value="${search}" placeholder="Buscar por nombre...">
                                </div>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-search me-2"></i>
                                    Buscar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Tabla de ingredientes -->
                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-4">NOMBRE</th>
                                        <th>STOCK</th>
                                        <th>UNIDAD</th>
                                        <th>PRECIO COMPRA</th>
                                        <th>ESTADO</th>
                                        <th class="text-end pe-4">ACCIONES</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="ingrediente : ${ingredientes}"
                                        th:class="${ingrediente.stockDisponible != null and ingrediente.stockDisponible < 5} ? 'table-warning' : ''">
                                        <td class="ps-4 fw-semibold" th:text="${ingrediente.nombre}">Harina</td>
                                        <td>
                                            <span th:text="${ingrediente.stockDisponible}">10</span>
                                            <small class="text-secondary"
                                                th:text="${ingrediente.unidadMedida}">kg</small>
                                        </td>
                                        <td th:text="${ingrediente.unidadMedida}">kg</td>
                                        <td>
                                            <span th:if="${ingrediente.precioCompra}">$</span>
                                            <span th:text="${ingrediente.precioCompra}">25.50</span>
                                        </td>
                                        <td>
                                            <span class="badge bg-success bg-opacity-10 text-success"
                                                th:if="${ingrediente.estaActivo}">
                                                <i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>
                                                Activo
                                            </span>
                                            <span class="badge bg-secondary bg-opacity-10 text-secondary"
                                                th:unless="${ingrediente.estaActivo}">
                                                <i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>
                                                Inactivo
                                            </span>
                                        </td>
                                        <td class="text-end pe-4">
                                            <div class="action-buttons">
                                                <a th:href="@{/ingredientes/ver/{id}(id=${ingrediente.id})}"
                                                    class="btn btn-sm btn-outline-info" title="Ver detalle">
                                                    <i class="bi bi-eye"></i>
                                                </a>
                                                <a th:href="@{/ingredientes/editar/{id}(id=${ingrediente.id})}"
                                                    class="btn btn-sm btn-outline-primary" title="Editar">
                                                    <i class="bi bi-pencil"></i>
                                                </a>
                                                <a th:href="@{/ingredientes/eliminar/{id}(id=${ingrediente.id})}"
                                                    class="btn btn-sm btn-outline-danger" title="Eliminar"
                                                    onclick="return confirm('¿Estás seguro de eliminar este ingrediente?')">
                                                    <i class="bi bi-trash"></i>
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${ingredientes.empty}">
                                        <td colspan="6" class="text-center py-5 text-secondary">
                                            <i class="bi bi-inbox display-4 d-block mb-3"></i>
                                            No hay ingredientes para mostrar
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Paginación -->
                <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4">
                    <div class="text-secondary small">
                        Mostrando página <span th:text="${currentPage + 1}"></span> de <span
                            th:text="${totalPages}"></span>
                    </div>
                    <nav aria-label="Paginación">
                        <ul class="pagination mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/ingredientes(page=${currentPage - 1}, size=${pageSize}, search=${search})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link"
                                    th:href="@{/ingredientes(page=${i}, size=${pageSize}, search=${search})}"
                                    th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/ingredientes(page=${currentPage + 1}, size=${pageSize}, search=${search})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>

                <!-- FOOTER -->
                <div th:replace="~{fragments/footer :: footer}"></div>

            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
