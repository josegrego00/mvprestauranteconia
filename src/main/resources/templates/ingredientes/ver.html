<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head}"></head>

<body>

    <!-- NAVBAR -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR IZQUIERDO -->
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mt-4 mb-4">
                    <div class="welcome-section">
                        <h1 class="welcome-title">
                            <i class="bi bi-info-circle me-2"></i>
                            Detalle del Ingrediente
                        </h1>
                        <p class="welcome-subtitle" th:text="${ingrediente.nombre}">
                            Harina de trigo
                        </p>
                    </div>
                    <div>
                        <a th:href="@{/ingredientes/editar/{id}(id=${ingrediente.id})}" class="btn btn-primary me-2">
                            <i class="bi bi-pencil me-2"></i>
                            Editar
                        </a>
                        <a th:href="@{/ingredientes}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>
                            Volver
                        </a>
                    </div>
                </div>

                <!-- Detalles -->
                <div class="row">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header bg-white py-3">
                                <h5 class="mb-0 fw-semibold">
                                    <i class="bi bi-info-square me-2"></i>
                                    Información General
                                </h5>
                            </div>
                            <div class="card-body">
                                <table class="table table-borderless">
                                    <tr>
                                        <td class="text-secondary" width="200">Nombre:</td>
                                        <td class="fw-semibold" th:text="${ingrediente.nombre}">Harina de trigo</td>
                                    </tr>
                                    <tr>
                                        <td class="text-secondary">Unidad de Medida:</td>
                                        <td class="fw-semibold" th:text="${ingrediente.unidadMedida}">kg</td>
                                    </tr>
                                    <tr>
                                        <td class="text-secondary">Stock Disponible:</td>
                                        <td>
                                            <span class="fw-semibold"
                                                th:text="${ingrediente.stockDisponible}">25.5</span>
                                            <span class="text-secondary" th:text="${ingrediente.unidadMedida}">kg</span>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="text-secondary">Precio de Compra:</td>
                                        <td class="fw-semibold">$ <span
                                                th:text="${ingrediente.precioCompra}">25.50</span></td>
                                    </tr>
                                    <tr>
                                        <td class="text-secondary">Estado:</td>
                                        <td>
                                            <span class="badge bg-success" th:if="${ingrediente.estaActivo}">
                                                <i class="bi bi-check-circle me-1"></i>
                                                Activo
                                            </span>
                                            <span class="badge bg-secondary" th:unless="${ingrediente.estaActivo}">
                                                <i class="bi bi-x-circle me-1"></i>
                                                Inactivo
                                            </span>
                                        </td>
                                    </tr>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Card de estadísticas rápidas -->
                    <div class="col-md-4">
                        <div class="card bg-primary text-white">
                            <div class="card-body text-center py-4">
                                <i class="bi bi-box-seam display-4 d-block mb-3"></i>
                                <h3 class="fw-bold" th:text="${ingrediente.stockDisponible}">25.5</h3>
                                <p class="mb-0 opacity-75">Stock actual en <span
                                        th:text="${ingrediente.unidadMedida}">kg</span></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FOOTER -->
                <div th:replace="~{fragments/footer :: footer}"></div>

            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
