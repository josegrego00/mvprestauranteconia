<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<!-- HEAD -->

<head th:replace="fragments/head :: head"></head>

<body>

    <!-- NAVBAR -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div th:replace="fragments/sidebar :: sidebar"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

                <div class="container mt-4">
                    <div class="row justify-content-center">
                        <div class="col-md-6 col-lg-5">

                            <div class="register-card">

                                <!-- Header -->
                                <div class="register-header">
                                    <i class="bi bi-person-plus-fill"></i>
                                    <h2>Registro de Usuario</h2>
                                    <p>Complete el formulario para crear un nuevo usuario</p>
                                </div>

                                <!-- Mensajes -->
                                <div th:if="${success}" class="alert alert-success">
                                    <i class="bi bi-check-circle-fill"></i>
                                    <span th:text="${success}"></span>
                                </div>

                                <div th:if="${error}" class="alert alert-danger">
                                    <i class="bi bi-exclamation-triangle-fill"></i>
                                    <span th:text="${error}"></span>
                                </div>

                                <!-- Formulario -->
                                <form th:action="@{/guardar}" th:object="${usuario}" method="post">

                                    <div class="mb-4">
                                        <label class="form-label">
                                            <i class="bi bi-person"></i>
                                            Nombre Completo
                                        </label>
                                        <input type="text" class="form-control" th:field="*{nombre}" required>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">
                                            <i class="bi bi-person-badge"></i>
                                            Usuario
                                        </label>
                                        <input type="text" class="form-control" th:field="*{nombreUsuario}" required>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">
                                            <i class="bi bi-lock"></i>
                                            Contraseña
                                        </label>
                                        <input type="password" class="form-control" th:field="*{contrasenna}" required>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">
                                            <i class="bi bi-envelope"></i>
                                            Correo Electrónico
                                        </label>
                                        <input type="email" class="form-control" th:field="*{email}" required>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label">
                                            <i class="bi bi-tag"></i>
                                            Rol
                                        </label>
                                        <select class="form-select" th:field="*{rol}" required>
                                            <option value="">Seleccione...</option>
                                            <option value="ADMIN">Administrador</option>
                                            <option value="CAJERO">Cajero</option>
                                            <option value="DESARROLLADOR">Desarrollador</option>
                                        </select>
                                    </div>

                                    <div class="mb-4 form-check">
                                        <input type="checkbox" class="form-check-input" th:field="*{estaActivo}">
                                        <label class="form-check-label">
                                            Usuario activo
                                        </label>
                                    </div>

                                    <button type="submit" class="btn btn-primary w-100">
                                        <i class="bi bi-save"></i>
                                        Registrar Usuario
                                    </button>

                                </form>

                            </div>

                        </div>
                    </div>
                </div>

                <!-- FOOTER -->
                <div th:replace="fragments/footer :: footer"></div>

            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
